name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test library
        run: pnpm --dir packages/react-flow-modal test

      - name: Typecheck library
        run: pnpm --dir packages/react-flow-modal exec tsc --noEmit

      - name: Build library
        run: pnpm --dir packages/react-flow-modal build

      - name: Validate demo
        run: |
          pnpm --dir demo lint
          pnpm --dir demo build
