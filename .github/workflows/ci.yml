name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test library
        run: pnpm --dir packages/react-flow-modal test

      - name: Typecheck library
        run: pnpm --dir packages/react-flow-modal exec tsc --noEmit

      - name: Build library
        run: pnpm --dir packages/react-flow-modal build

      - name: Validate demo
        run: |
          pnpm --dir demo lint
          pnpm --dir demo build
